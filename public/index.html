<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARUNYA CONSUMABLES - Distribution Management System</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="app-container app-loading" id="appContainer">
        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="#dashboard" class="sidebar-logo" data-page="dashboard">
                    <div class="logo-icon">A</div>
                    <span class="logo-text">Arunya</span>
                </a>
            </div>

            <nav class="sidebar-nav">
                <a href="#dashboard" class="nav-link active" data-page="dashboard">
                    <span class="nav-icon">🏠</span>
                    <span>Home</span>
                </a>
                <a href="#stores" class="nav-link" data-page="stores">
                    <span class="nav-icon">👥</span>
                    <span>Customer</span>
                </a>
                <a href="#billing" class="nav-link" data-page="billing">
                    <span class="nav-icon">🧾</span>
                    <span>Invoice</span>
                </a>
                <a href="#sales" class="nav-link" data-page="sales">
                    <span class="nav-icon">💰</span>
                    <span>Sales</span>
                </a>
                <a href="#products" class="nav-link" data-page="products">
                    <span class="nav-icon">📦</span>
                    <span>Products</span>
                </a>
                <a href="#suppliers" class="nav-link" data-page="suppliers">
                    <span class="nav-icon">🏭</span>
                    <span>Vendor</span>
                </a>
                <a href="#purchase" class="nav-link" data-page="purchase">
                    <span class="nav-icon">📥</span>
                    <span>Purchase</span>
                </a>
                <a href="#inventory" class="nav-link" data-page="inventory">
                    <span class="nav-icon">📋</span>
                    <span>Inventory</span>
                </a>
                <a href="#despatch" class="nav-link" data-page="despatch">
                    <span class="nav-icon">🚚</span>
                    <span>Despatch</span>
                </a>
                <a href="#staff" class="nav-link" data-page="staff">
                    <span class="nav-icon">👤</span>
                    <span>Staff</span>
                </a>
                <a href="#payroll" class="nav-link" data-page="payroll">
                    <span class="nav-icon">💳</span>
                    <span>Payroll</span>
                </a>
                <a href="#settings" class="nav-link" data-page="settings">
                    <span class="nav-icon">⚙️</span>
                    <span>Setting</span>
                </a>
            </nav>
        </aside>

        <!-- Main Wrapper -->
        <div class="main-wrapper">
            <!-- Header Bar -->
            <header class="header">
                <div class="header-title">ARUNYA CONSUMABLES</div>
                <div class="header-right">
                    <span class="header-info">Account: <span id="userName"></span></span>
                    <button class="header-btn" onclick="Auth.logout()">Logout</button>
                </div>
            </header>

            <!-- Sub Header -->
            <div class="subheader">
                <div class="breadcrumb">
                    <a href="#dashboard" class="breadcrumb-link">‹‹Back</a>
                </div>
                <div class="subheader-actions">
                    <button class="btn btn-success" id="saveBtn" style="display: none;">Save</button>
                </div>
            </div>

            <!-- Content Area -->
            <main class="content-area" id="contentArea">
                <!-- Content injected here -->
            </main>
        </div>
    </div>

    <!-- Modal Container -->
    <div id="modalContainer"></div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/database.js"></script>
    <script src="js/components.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/stores.js"></script>
    <script src="js/products.js"></script>
    <script src="js/billing.js"></script>
    <script src="js/sales.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/despatch.js"></script>
    <script src="js/staff.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/suppliers.js"></script>
    <script src="js/purchase.js"></script>
    <script src="js/payroll.js"></script>
    <script src="app.js"></script>

</body>

</html>
