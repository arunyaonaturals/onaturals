<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Arunaya Consumables</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #c4956a;
            --primary-dark: #a67c52;
            --primary-light: #d4a574;
            --text-main: #3d3632;
            --text-light: #7a6f66;
            --text-white: #ffffff;
            --danger: #f87171;
            --success: #4ade80;
            --card-bg: #faf7f4;
            --surface: #fffcf9;
        }

        body {
            font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5e6d8 0%, #e8d5c4 50%, #dcc8b5 100%);
            min-height: 100vh;
        }

        .login-wrapper {
            display: flex;
            min-height: 100vh;
            padding: 24px;
        }

        .login-container {
            display: flex;
            width: 100%;
            max-width: 1100px;
            margin: auto;
            background: var(--surface);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(139, 115, 85, 0.15);
        }

        /* Left Side - Branding */
        .login-branding {
            flex: 1;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: var(--text-white);
            position: relative;
            overflow: hidden;
        }

        .login-branding::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
        }

        .login-branding::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .branding-content {
            max-width: 400px;
            z-index: 1;
        }

        .brand-logo {
            width: 64px;
            height: 64px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 32px;
            color: var(--text-white);
        }

        .brand-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .brand-subtitle {
            font-size: 16px;
            font-weight: 400;
            opacity: 0.9;
            margin-bottom: 40px;
        }

        .brand-features {
            list-style: none;
            padding: 0;
        }

        .brand-features li {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
            font-size: 15px;
            opacity: 0.95;
        }

        .brand-features li::before {
            content: '✓';
            width: 28px;
            height: 28px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
        }

        /* Right Side - Form */
        .login-form-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            background: var(--surface);
        }

        .form-container {
            width: 100%;
            max-width: 380px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .form-header h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .form-header p {
            font-size: 15px;
            color: var(--text-light);
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 15px;
            border: 2px solid #e8e0d8;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: var(--text-main);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(196, 149, 106, 0.15);
        }

        .form-input:hover {
            border-color: #d9d2ca;
        }

        .form-input::placeholder {
            color: #a69d94;
        }

        .password-toggle-wrapper {
            position: relative;
        }

        .password-toggle-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-light);
            transition: color 0.2s;
            padding: 0;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle-btn:hover {
            color: var(--text-main);
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .remember-me input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .remember-me label {
            font-size: 14px;
            color: var(--text-light);
            cursor: pointer;
            user-select: none;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 16px 28px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(196, 149, 106, 0.25);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(196, 149, 106, 0.35);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fef2f2;
            color: var(--danger);
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 24px;
            display: none;
            border-left: 4px solid var(--danger);
            animation: slideDown 0.3s ease;
        }

        .error-message.show {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 968px) {
            .login-wrapper {
                padding: 16px;
            }

            .login-container {
                flex-direction: column;
            }

            .login-branding {
                min-height: 280px;
                padding: 48px 32px;
            }

            .brand-title {
                font-size: 26px;
            }

            .login-form-section {
                padding: 48px 32px;
            }
        }

        @media (max-width: 480px) {

            .login-branding,
            .login-form-section {
                padding: 36px 24px;
            }

            .form-header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-container">
            <!-- Left Side - Branding -->
            <div class="login-branding">
                <div class="branding-content">
                    <div class="brand-logo">A</div>
                    <h1 class="brand-title">ARUNAYA CONSUMABLES</h1>
                    <p class="brand-subtitle">Distribution Management System</p>
                    <ul class="brand-features">
                        <li>Inventory Management</li>
                        <li>Sales Order Tracking</li>
                        <li>Billing & Invoicing</li>
                        <li>Real-time Analytics</li>
                    </ul>
                </div>
            </div>

            <!-- Right Side - Login Form -->
            <div class="login-form-section">
                <div class="form-container">
                    <div class="form-header">
                        <h1>Welcome Back</h1>
                        <p>Sign in to your account to continue</p>
                    </div>

                    <div id="errorMessage" class="error-message">
                        <span>⚠️</span>
                        <span id="errorText"></span>
                    </div>

                    <form id="loginForm">
                        <div class="form-group">
                            <label class="form-label" for="username">Username</label>
                            <input type="text" id="username" name="username" class="form-input" required autofocus
                                autocomplete="username" placeholder="Enter your username">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="password">Password</label>
                            <div class="password-toggle-wrapper">
                                <input type="password" id="password" name="password" class="form-input" required
                                    autocomplete="current-password" placeholder="Enter your password">
                                <button type="button" class="password-toggle-btn" id="togglePassword">👁️</button>
                            </div>
                        </div>

                        <div class="remember-me">
                            <input type="checkbox" id="rememberMe" name="rememberMe">
                            <label for="rememberMe">Remember me for 30 days</label>
                        </div>

                        <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check if already logged in
        const existingUser = localStorage.getItem('user') || sessionStorage.getItem('user');
        if (existingUser) {
            window.location.href = '/';
        }

        // Password toggle
        document.getElementById('togglePassword').addEventListener('click', function () {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });

        // Form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const loginBtn = document.getElementById('loginBtn');

            // Hide previous errors
            errorMessage.classList.remove('show');

            // Disable button
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Store user data
                    const storage = rememberMe ? localStorage : sessionStorage;
                    storage.setItem('user', JSON.stringify(data.user));

                    // Redirect to main app
                    window.location.href = '/';
                } else {
                    throw new Error(data.error || 'Invalid credentials');
                }
            } catch (error) {
                errorText.textContent = error.message || 'Login failed. Please try again.';
                errorMessage.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>

</html>
